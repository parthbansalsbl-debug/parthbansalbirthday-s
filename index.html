<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Nandini</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:#020111;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* PARALLAX STARS */

.star{
position:fixed;
background:white;
border-radius:50%;
opacity:.8;
}

/* INTRO */

#intro{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#020111,#000);
}

button{
padding:14px 35px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
cursor:pointer;
box-shadow:0 0 20px #ff4d6d;
}

/* CARD */

.card{
display:none;
backdrop-filter:blur(18px);
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.25);
border-radius:18px;
padding:35px;
max-width:520px;
text-align:center;
box-shadow:0 0 40px rgba(255,0,100,.3);
}

/* TITLE */

h1{
font-size:clamp(34px,7vw,56px);
margin-bottom:20px;
background:linear-gradient(45deg,#ff4d6d,#ff9a9e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* 3D CAKE */

.cake{
width:120px;
height:120px;
margin:20px auto;
transform-style:preserve-3d;
animation:spin 10s linear infinite;
}

.layer{
position:absolute;
width:120px;
height:35px;
background:#ff8fab;
border-radius:10px;
}

.layer:nth-child(2){top:40px;background:#ffb3c6}
.layer:nth-child(3){top:80px;background:#ffc2d1}

@keyframes spin{
from{transform:rotateY(0)}
to{transform:rotateY(360deg)}
}

/* MESSAGE */

#message{
margin:20px 0;
font-size:20px;
min-height:80px;
}

/* HEARTS */

.heart{
position:fixed;
bottom:-20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-110vh);opacity:0}
}

/* CONFETTI */

.confetti{
position:fixed;
width:8px;
height:8px;
}

</style>
</head>

<body>

<div id="intro">
<h2 style="margin-bottom:20px">🎁 Tap to Reveal Birthday Surprise</h2>
<button onclick="start()">Start</button>
</div>

<div class="card" id="card">

<h1>Happy Birthday Nandini Bansal 🎉</h1>

<div class="cake">
<div class="layer"></div>
<div class="layer"></div>
<div class="layer"></div>
</div>

<div id="message"></div>

<h3>With Love ❤️<br>Parth Bansal</h3>

</div>

<audio id="music" loop>
<source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid">
</audio>

<script>

/* START */

function start(){
document.getElementById("intro").style.display="none";
document.getElementById("card").style.display="block";
document.getElementById("music").play();
typeText();
hearts();
confetti();
fireworks();
}

/* TYPE MESSAGE */

const text="May your birthday be full of happiness, laughter, and magical moments. You make life brighter every single day.";

let i=0;

function typeText(){

if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(typeText,40);
}

}

/* HEARTS */

function hearts(){

setInterval(()=>{

let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(20+Math.random()*20)+"px";

document.body.appendChild(h);

setTimeout(()=>h.remove(),6000);

},400);

}

/* CONFETTI */

function confetti(){

setInterval(()=>{

let c=document.createElement("div");

c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.top="-10px";
c.style.background=`hsl(${Math.random()*360},70%,60%)`;

document.body.appendChild(c);

let fall=setInterval(()=>{
c.style.top=(c.offsetTop+5)+"px";
if(c.offsetTop>window.innerHeight){
c.remove();
clearInterval(fall);
}
},30);

},80);

}

/* FIREWORKS */

function fireworks(){

setInterval(()=>{

let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight/2;

for(let i=0;i<25;i++){

let spark=document.createElement("div");

spark.style.position="fixed";
spark.style.left=x+"px";
spark.style.top=y+"px";
spark.style.width="4px";
spark.style.height="4px";
spark.style.background="white";
spark.style.borderRadius="50%";

let angle=Math.random()*360;
let dist=Math.random()*150;

spark.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px)`,opacity:0}
],{duration:1000});

document.body.appendChild(spark);

setTimeout(()=>spark.remove(),1000);

}

},2500);

}

/* PARALLAX STARS */

for(let i=0;i<200;i++){

let s=document.createElement("div");

s.className="star";
let size=Math.random()*2;

s.style.width=size+"px";
s.style.height=size+"px";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";

document.body.appendChild(s);

}

</script>

</body>
</html>
